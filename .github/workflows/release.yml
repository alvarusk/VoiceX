name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      apple_release_track:
        description: "How Apple builds should be distributed"
        required: false
        default: testflight
        type: choice
        options:
          - testflight
          - app-store

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_USER_EMAIL: ${{ secrets.SUPABASE_USER_EMAIL }}
      SUPABASE_USER_PASSWORD: ${{ secrets.SUPABASE_USER_PASSWORD }}
      R2_ACCOUNT_ID: "${{ secrets.R2_ACCOUNT_ID }}"
      R2_ACCESS_KEY: "${{ secrets.R2_ACCESS_KEY }}"
      R2_SECRET_KEY: "${{ secrets.R2_SECRET_KEY }}"
      R2_BUCKET: "${{ secrets.R2_BUCKET }}"
      R2_PUBLIC_BASE: "${{ secrets.R2_PUBLIC_BASE }}"
    steps:
      - uses: actions/checkout@v6
      - name: Resolve app version (Windows)
        shell: pwsh
        run: |
          $pubspec = Get-Content pubspec.yaml -Raw
          if ($pubspec -notmatch '(?m)^version:\s*([0-9]+\.[0-9]+\.[0-9]+)(?:\+([0-9]+))?\s*$') {
            throw "Missing or invalid version in pubspec.yaml"
          }
          $buildName = $matches[1]
          $buildNumber = if ($matches[2]) { [int]$matches[2] } else { 0 }
          $runNumber = if ($env:GITHUB_RUN_NUMBER) { [int]$env:GITHUB_RUN_NUMBER } else { 0 }
          if ($runNumber -gt $buildNumber) { $buildNumber = $runNumber }
          $storeBuildName = $buildName
          if ($runNumber -gt 0) {
            $parts = $buildName.Split('.')
            if ($parts.Length -eq 3) {
              $storeBuildName = "$($parts[0]).$($parts[1]).$runNumber"
            }
          }
          # MS Store requires Appx/Package revision to be 0 (4th segment).
          $msixVersion = "$storeBuildName.0"
          $pubspec = [regex]::Replace($pubspec, '(?m)^\s*msix_version:\s*.*$', "  msix_version: $msixVersion")
          Set-Content -Path pubspec.yaml -Value $pubspec -NoNewline
          Add-Content -Path $env:GITHUB_ENV -Value "APP_VERSION_NAME=$storeBuildName"
          Add-Content -Path $env:GITHUB_ENV -Value "APP_VERSION_CODE=$buildNumber"
          Add-Content -Path $env:GITHUB_ENV -Value "MSIX_VERSION=$msixVersion"
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Cache Pub (Windows)
        uses: actions/cache@v5
        with:
          path: |
            C:\Users\runneradmin\AppData\Local\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - name: Cache Gradle (Windows)
        uses: actions/cache@v5
        with:
          path: |
            C:\Users\runneradmin\.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
      - name: Decode signing certificate
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
        run: |
          if (-not $env:WINDOWS_PFX_BASE64) { throw "Missing WINDOWS_PFX_BASE64 secret" }
          New-Item -ItemType Directory -Force -Path windows/certs | Out-Null
          [IO.File]::WriteAllBytes("windows/certs/code_sign.pfx", [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
      - name: Build Windows MSIX
        env:
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        shell: pwsh
        run: |
          if (Test-Path build/msix) { Remove-Item -Recurse -Force build/msix }
          Write-Host "MSIX_VERSION=$env:MSIX_VERSION"
          Select-String -Path pubspec.yaml -Pattern '^\s*msix_version:\s*' | ForEach-Object { Write-Host $_.Line }
          flutter build windows --release `
            --build-name $env:APP_VERSION_NAME `
            --build-number $env:APP_VERSION_CODE `
            --dart-define SUPABASE_URL=$env:SUPABASE_URL `
            --dart-define SUPABASE_ANON_KEY=$env:SUPABASE_ANON_KEY `
            --dart-define SUPABASE_USER_EMAIL=$env:SUPABASE_USER_EMAIL `
            --dart-define SUPABASE_USER_PASSWORD=$env:SUPABASE_USER_PASSWORD `
            --dart-define R2_ACCOUNT_ID=$env:R2_ACCOUNT_ID `
            --dart-define R2_ACCESS_KEY=$env:R2_ACCESS_KEY `
            --dart-define R2_SECRET_KEY=$env:R2_SECRET_KEY `
            --dart-define R2_BUCKET=$env:R2_BUCKET `
            --dart-define R2_PUBLIC_BASE=$env:R2_PUBLIC_BASE
          # Genera MSIX sin firmar (la Store re-firma)
          flutter pub run msix:create `
            --output-path build/msix `
            --build-windows false `
            --publisher "CN=CCDE0167-EDA3-4A6F-B196-577B92A14DEC" `
            --publisher-display-name "Kingdom M" `
            --display-name "VoiceX for TakoWorks" `
            --identity-name "KingdomM.VoiceXforTakoWorks" `
            --certificate-path windows/certs/code_sign.pfx `
            --certificate-password $env:WINDOWS_PFX_PASSWORD `
            --install-certificate false
          $msix = Get-ChildItem -Path build/msix -Recurse -Filter *.msix | Select-Object -First 1
          if (-not $msix) { throw "MSIX not found under build/msix" }
          $tmp = Join-Path $env:RUNNER_TEMP "msix_manifest"
          if (Test-Path $tmp) { Remove-Item -Recurse -Force $tmp }
          New-Item -ItemType Directory -Force -Path $tmp | Out-Null
          Expand-Archive -Path $msix.FullName -DestinationPath $tmp -Force
          $manifestPath = Join-Path $tmp "AppxManifest.xml"
          if (Test-Path $manifestPath) {
            [xml]$manifest = Get-Content $manifestPath
            $manifestVersion = $manifest.Package.Identity.Version
            Write-Host "MSIX_MANIFEST_VERSION=$manifestVersion"
            if ($manifestVersion -ne $env:MSIX_VERSION) {
              throw "MSIX manifest version ($manifestVersion) does not match expected ($env:MSIX_VERSION)."
            }
          }
      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: msix
          path: build/msix/**/*.msix
      - name: Configure Microsoft Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1
      - name: Cancel pending Microsoft Store submission (if any)
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          PARTNER_CENTER_SELLER_ID: ${{ secrets.PARTNER_CENTER_SELLER_ID }}
          STORE_PRODUCT_ID: ${{ secrets.STORE_PRODUCT_ID }}
        run: |
          $ErrorActionPreference = "Stop"
          if (-not $env:AZURE_TENANT_ID) { throw "Missing AZURE_TENANT_ID secret" }
          if (-not $env:AZURE_CLIENT_ID) { throw "Missing AZURE_CLIENT_ID secret" }
          if (-not $env:AZURE_CLIENT_SECRET) { throw "Missing AZURE_CLIENT_SECRET secret" }
          if (-not $env:PARTNER_CENTER_SELLER_ID) { throw "Missing PARTNER_CENTER_SELLER_ID secret" }
          if (-not $env:STORE_PRODUCT_ID) { throw "Missing STORE_PRODUCT_ID secret" }

          msstore reconfigure `
            --tenantId $env:AZURE_TENANT_ID `
            --sellerId $env:PARTNER_CENTER_SELLER_ID `
            --clientId $env:AZURE_CLIENT_ID `
            --clientSecret $env:AZURE_CLIENT_SECRET

          $output = & msstore submission delete $env:STORE_PRODUCT_ID --no-confirm 2>&1
          $exitCode = $LASTEXITCODE
          if ($output) { $output | ForEach-Object { Write-Host $_ } }
          if ($exitCode -ne 0) {
            $joined = $output -join "`n"
            if ($joined -match "No pending submission found") {
              Write-Host "No pending submission; continuing."
              $global:LASTEXITCODE = 0
            } else {
              throw "msstore submission delete failed (exit $exitCode)."
            }
          }
          # Ensure this step exits cleanly after handling expected non-zero CLI codes.
          $global:LASTEXITCODE = 0
      - name: Publish MSIX to Microsoft Store
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          PARTNER_CENTER_SELLER_ID: ${{ secrets.PARTNER_CENTER_SELLER_ID }}
          STORE_PRODUCT_ID: ${{ secrets.STORE_PRODUCT_ID }}
        run: |
          $ErrorActionPreference = "Stop"
          if (-not $env:AZURE_TENANT_ID) { throw "Missing AZURE_TENANT_ID secret" }
          if (-not $env:AZURE_CLIENT_ID) { throw "Missing AZURE_CLIENT_ID secret" }
          if (-not $env:AZURE_CLIENT_SECRET) { throw "Missing AZURE_CLIENT_SECRET secret" }
          if (-not $env:PARTNER_CENTER_SELLER_ID) { throw "Missing PARTNER_CENTER_SELLER_ID secret" }
          if (-not $env:STORE_PRODUCT_ID) { throw "Missing STORE_PRODUCT_ID secret" }

          $msix = Get-ChildItem -Path build/msix -Recurse -Filter *.msix | Select-Object -First 1
          if (-not $msix) { throw "MSIX not found under build/msix" }
          Write-Host "Publishing MSIX: $($msix.FullName)"
          Write-Host "STORE_PRODUCT_ID=$env:STORE_PRODUCT_ID"
          Write-Host "PARTNER_CENTER_SELLER_ID=$env:PARTNER_CENTER_SELLER_ID"

          msstore reconfigure `
            --tenantId $env:AZURE_TENANT_ID `
            --sellerId $env:PARTNER_CENTER_SELLER_ID `
            --clientId $env:AZURE_CLIENT_ID `
            --clientSecret $env:AZURE_CLIENT_SECRET

          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            $output = & msstore publish "$($msix.FullName)" -id $env:STORE_PRODUCT_ID 2>&1
            $exitCode = $LASTEXITCODE
            if ($output) { $output | ForEach-Object { Write-Host $_ } }
            if ($exitCode -eq 0) { break }

            $joined = $output -join "`n"
            $retryable = $joined -match "Could not retrieve submission" -or $joined -match "Error while creating submission" -or $joined -match "Please try again"
            if ($attempt -lt $maxAttempts -and $retryable) {
              Write-Host "Transient Microsoft Store publish failure detected. Retrying in 20 seconds (attempt $attempt/$maxAttempts)..."
              Start-Sleep -Seconds 20
              continue
            }

            $message = @(
              "msstore publish failed (exit $exitCode)."
              "CLI output:"
              $joined
              "Common causes:"
              "- STORE_PRODUCT_ID is not the Partner Center product ID for this app."
              "- The app exists in Partner Center, but it has never had its first manual submission completed there."
              "- The Azure AD app is missing the Manager role in Partner Center."
              "- The submission is in a bad draft state in Partner Center and must be deleted manually."
            ) -join "`n"
            throw $message
          }

  build-android:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_USER_EMAIL: ${{ secrets.SUPABASE_USER_EMAIL }}
      SUPABASE_USER_PASSWORD: ${{ secrets.SUPABASE_USER_PASSWORD }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
      R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve app version (Linux)
        shell: bash
        run: |
          set -euo pipefail
          VERSION_LINE="$(grep -E '^version:' pubspec.yaml | head -n1 | awk '{print $2}')"
          if [ -z "$VERSION_LINE" ]; then
            echo "Missing version in pubspec.yaml"
            exit 1
          fi
          BUILD_NAME="${VERSION_LINE%%+*}"
          if [[ "$VERSION_LINE" == *"+"* ]]; then
            BUILD_NUMBER="${VERSION_LINE##*+}"
          else
            BUILD_NUMBER="0"
          fi
          if [ -n "${GITHUB_RUN_NUMBER:-}" ] && [ "$GITHUB_RUN_NUMBER" -gt "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="$GITHUB_RUN_NUMBER"
          fi
          echo "APP_VERSION_NAME=$BUILD_NAME" >> "$GITHUB_ENV"
          echo "APP_VERSION_CODE=$BUILD_NUMBER" >> "$GITHUB_ENV"
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Cache Pub (Linux)
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-
      - name: Cache Gradle (Linux)
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then echo "Missing ANDROID_KEYSTORE_BASE64 secret"; exit 1; fi
          mkdir -p android/app/keystores
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/keystores/upload.jks
      - name: Create key.properties
        run: |
          cat <<'EOF' > android/key.properties
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=keystores/upload.jks
          EOF
      - name: Build APK release (deprecated; prefer AAB)
        run: >
          flutter build apk --release
          --build-name $APP_VERSION_NAME
          --build-number $APP_VERSION_CODE
          --target-platform android-arm64
          --dart-define SUPABASE_URL=$SUPABASE_URL
          --dart-define SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          --dart-define SUPABASE_USER_EMAIL=$SUPABASE_USER_EMAIL
          --dart-define SUPABASE_USER_PASSWORD=$SUPABASE_USER_PASSWORD
          --dart-define R2_ACCOUNT_ID=$R2_ACCOUNT_ID
          --dart-define R2_ACCESS_KEY=$R2_ACCESS_KEY
          --dart-define R2_SECRET_KEY=$R2_SECRET_KEY
          --dart-define R2_BUCKET=$R2_BUCKET
          --dart-define R2_PUBLIC_BASE=$R2_PUBLIC_BASE
      - name: Build AAB release
        run: >
          flutter build appbundle --release
          --build-name $APP_VERSION_NAME
          --build-number $APP_VERSION_CODE
          --dart-define SUPABASE_URL=$SUPABASE_URL
          --dart-define SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          --dart-define SUPABASE_USER_EMAIL=$SUPABASE_USER_EMAIL
          --dart-define SUPABASE_USER_PASSWORD=$SUPABASE_USER_PASSWORD
          --dart-define R2_ACCOUNT_ID=$R2_ACCOUNT_ID
          --dart-define R2_ACCESS_KEY=$R2_ACCESS_KEY
          --dart-define R2_SECRET_KEY=$R2_SECRET_KEY
          --dart-define R2_BUCKET=$R2_BUCKET
          --dart-define R2_PUBLIC_BASE=$R2_PUBLIC_BASE
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android
          path: |
            build/app/outputs/bundle/release/*.aab
            build/app/outputs/flutter-apk/*.apk
      - name: Install fastlane
        run: sudo gem install fastlane -N
      - name: Decode Play service account
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$PLAY_SERVICE_ACCOUNT_JSON" ]; then echo "Missing PLAY_SERVICE_ACCOUNT_JSON secret"; exit 1; fi
          echo "$PLAY_SERVICE_ACCOUNT_JSON" | base64 -d > /tmp/play.json
      - name: Upload AAB to Play (internal track)
        env:
          PLAY_PACKAGE_NAME: ${{ secrets.PLAY_PACKAGE_NAME }}
        run: |
          if [ -z "$PLAY_PACKAGE_NAME" ]; then echo "Missing PLAY_PACKAGE_NAME secret"; exit 1; fi
          fastlane supply \
            --aab build/app/outputs/bundle/release/app-release.aab \
            --json_key /tmp/play.json \
            --package_name "$PLAY_PACKAGE_NAME" \
            --track internal \
            --skip_upload_apk true \
            --skip_upload_metadata true \
            --skip_upload_images true \
            --skip_upload_screenshots true

  build-apple:
    runs-on: macos-latest
    timeout-minutes: 120
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
      R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
      APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
      APPLE_CERTIFICATES_P12_BASE64: ${{ secrets.APPLE_CERTIFICATES_P12_BASE64 }}
      APPLE_CERTIFICATES_P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATES_P12_PASSWORD }}
      APPLE_IOS_APPSTORE_PROFILE_BASE64: ${{ secrets.APPLE_IOS_APPSTORE_PROFILE_BASE64 }}
      APPLE_MACOS_APPSTORE_PROFILE_BASE64: ${{ secrets.APPLE_MACOS_APPSTORE_PROFILE_BASE64 }}
      APPSTORE_API_KEY_ID: ${{ vars.APPSTORE_API_KEY_ID }}
      APPSTORE_ISSUER_ID: ${{ vars.APPSTORE_ISSUER_ID }}
      APPLE_TEAM_ID: R24Q9H7VFW
      IOS_BUNDLE_ID: com.kingdomm.voicex
      MACOS_BUNDLE_ID: com.kingdomm.voicex
      APPLE_AUTOMATIC_RELEASE: ${{ vars.APPLE_AUTOMATIC_RELEASE || 'false' }}
      APPLE_SUBMISSION_INFORMATION_JSON: ${{ vars.APPLE_SUBMISSION_INFORMATION_JSON || '' }}
      APPLE_RUNNER_KEYCHAIN: build
      APPLE_RUNNER_KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}-apple
    steps:
      - uses: actions/checkout@v6

      - name: Resolve app version (Apple)
        id: apple_version
        shell: bash
        env:
          APPLE_RELEASE_TRACK_INPUT: ${{ inputs.apple_release_track || '' }}
        run: |
          set -euo pipefail
          VERSION_LINE="$(grep -E '^version:' pubspec.yaml | head -n1 | awk '{print $2}')"
          if [ -z "$VERSION_LINE" ]; then
            echo "Missing version in pubspec.yaml"
            exit 1
          fi
          BUILD_NAME="${VERSION_LINE%%+*}"
          if [[ "$VERSION_LINE" == *"+"* ]]; then
            BUILD_NUMBER="${VERSION_LINE##*+}"
          else
            BUILD_NUMBER="0"
          fi
          if [ -n "${GITHUB_RUN_NUMBER:-}" ] && [ "$GITHUB_RUN_NUMBER" -gt "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="$GITHUB_RUN_NUMBER"
          fi

          RELEASE_TRACK="testflight"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "$APPLE_RELEASE_TRACK_INPUT" ]; then
            RELEASE_TRACK="$APPLE_RELEASE_TRACK_INPUT"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RELEASE_TRACK="app-store"
          fi

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$TAG_VERSION" != "$BUILD_NAME" ]; then
              echo "Tag version ($TAG_VERSION) does not match pubspec version ($BUILD_NAME)."
              exit 1
            fi
          fi

          echo "APP_VERSION_NAME=$BUILD_NAME" >> "$GITHUB_ENV"
          echo "APP_VERSION_CODE=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "APPLE_RELEASE_TRACK=$RELEASE_TRACK" >> "$GITHUB_ENV"
          echo "build_name=$BUILD_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "release_track=$RELEASE_TRACK" >> "$GITHUB_OUTPUT"

      - name: Validate Apple CI secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for key in \
            SUPABASE_URL \
            SUPABASE_ANON_KEY \
            R2_ACCOUNT_ID \
            R2_ACCESS_KEY \
            R2_SECRET_KEY \
            R2_BUCKET \
            R2_PUBLIC_BASE \
            APPSTORE_API_PRIVATE_KEY \
            APPSTORE_API_KEY_ID \
            APPSTORE_ISSUER_ID \
            APPLE_CERTIFICATES_P12_BASE64 \
            APPLE_CERTIFICATES_P12_PASSWORD \
            APPLE_IOS_APPSTORE_PROFILE_BASE64 \
            APPLE_MACOS_APPSTORE_PROFILE_BASE64
          do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing Apple CI configuration: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Log selected Xcode
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Pub (Apple)
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache CocoaPods (Apple)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cocoapods/repos
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('ios/Podfile.lock', 'macos/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Install dependencies
        run: flutter pub get

      - name: Install fastlane
        run: gem install fastlane -N

      - name: Import Apple signing certificates
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATES_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATES_P12_PASSWORD }}
          keychain: ${{ env.APPLE_RUNNER_KEYCHAIN }}
          keychain-password: ${{ env.APPLE_RUNNER_KEYCHAIN_PASSWORD }}

      - name: Create App Store Connect API key files
        shell: bash
        run: |
          set -euo pipefail
          P8_PATH="$RUNNER_TEMP/AuthKey_${APPSTORE_API_KEY_ID}.p8"
          JSON_PATH="$RUNNER_TEMP/appstore_api_key.json"
          printf '%s' "$APPSTORE_API_PRIVATE_KEY" > "$P8_PATH"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["RUNNER_TEMP"]) / "appstore_api_key.json"
          path.write_text(
              json.dumps(
                  {
                      "key_id": os.environ["APPSTORE_API_KEY_ID"],
                      "issuer_id": os.environ["APPSTORE_ISSUER_ID"],
                      "key": os.environ["APPSTORE_API_PRIVATE_KEY"],
                      "in_house": False,
                  }
              ),
              encoding="utf-8",
          )
          PY
          echo "APPSTORE_API_KEY_P8=$P8_PATH" >> "$GITHUB_ENV"
          echo "APPSTORE_API_KEY_JSON=$JSON_PATH" >> "$GITHUB_ENV"

      - name: Install App Store provisioning profiles
        shell: bash
        run: |
          set -euo pipefail
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"

          install_profile() {
            local profile_path="$1"
            local decoded_plist="$2"
            local extension="$3"
            local env_name="$4"

            security cms -D -i "$profile_path" > "$decoded_plist"
            local uuid
            local name
            uuid=$(/usr/libexec/PlistBuddy -c "Print UUID" "$decoded_plist")
            name=$(/usr/libexec/PlistBuddy -c "Print Name" "$decoded_plist")
            cp "$profile_path" "$PROFILES_DIR/$uuid.$extension"
            printf '%s=%s\n' "$env_name" "$name" >> "$GITHUB_ENV"
          }

          IOS_PROFILE_PATH="$RUNNER_TEMP/voiceX-ios-appstore.mobileprovision"
          printf '%s' "$APPLE_IOS_APPSTORE_PROFILE_BASE64" | base64 --decode > "$IOS_PROFILE_PATH"
          install_profile "$IOS_PROFILE_PATH" "$RUNNER_TEMP/voiceX-ios-appstore.plist" "mobileprovision" "IOS_PROFILE_NAME"

          MACOS_PROFILE_PATH="$RUNNER_TEMP/voiceX-macos-appstore.provisionprofile"
          printf '%s' "$APPLE_MACOS_APPSTORE_PROFILE_BASE64" | base64 --decode > "$MACOS_PROFILE_PATH"
          install_profile "$MACOS_PROFILE_PATH" "$RUNNER_TEMP/voiceX-macos-appstore.plist" "provisionprofile" "MACOS_PROFILE_NAME"

      - name: Create Apple dart-defines file
        shell: bash
        run: |
          set -euo pipefail
          DEFINES_PATH="$RUNNER_TEMP/apple_dart_defines.json"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          keys = [
              "SUPABASE_URL",
              "SUPABASE_ANON_KEY",
              "R2_ACCOUNT_ID",
              "R2_ACCESS_KEY",
              "R2_SECRET_KEY",
              "R2_BUCKET",
              "R2_PUBLIC_BASE",
          ]
          data = {k: os.environ[k] for k in keys if os.environ.get(k)}
          path = Path(os.environ["RUNNER_TEMP"]) / "apple_dart_defines.json"
          path.write_text(json.dumps(data, separators=(",", ":")), encoding="utf-8")
          print(path)
          PY
          echo "APPLE_DART_DEFINES_FILE=$DEFINES_PATH" >> "$GITHUB_ENV"

      - name: Resolve Apple release notes
        shell: bash
        run: |
          set -euo pipefail
          notes="Improvements and minor bug fixes."
          printf 'APPLE_RELEASE_NOTES=%s\n' "$notes" >> "$GITHUB_ENV"

      - name: Prepare iOS Flutter config
        shell: bash
        run: |
          set -euo pipefail
          flutter build ios \
            --release \
            --config-only \
            --build-name "$APP_VERSION_NAME" \
            --build-number "$APP_VERSION_CODE" \
            --dart-define-from-file="$APPLE_DART_DEFINES_FILE"
          pushd ios >/dev/null
          pod install
          popd >/dev/null

      - name: Configure iOS Runner signing for CI
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("ios/Runner.xcodeproj/project.pbxproj")
          text = path.read_text(encoding="utf-8")
          profile_name = os.environ["IOS_PROFILE_NAME"]

          def patch_block(match: re.Match[str]) -> str:
              block = match.group(0)
              if "PRODUCT_BUNDLE_IDENTIFIER = com.kingdomm.voicex;" not in block:
                  return block
              if "name = Release;" not in block and "name = Profile;" not in block:
                  return block

              block = re.sub(r"CODE_SIGN_STYLE = [^;]+;", "CODE_SIGN_STYLE = Manual;", block)
              if 'CODE_SIGN_IDENTITY = "Apple Distribution";' not in block:
                  block = block.replace(
                      "CODE_SIGN_ENTITLEMENTS = \"\";\n",
                      "CODE_SIGN_ENTITLEMENTS = \"\";\n\t\t\t\tCODE_SIGN_IDENTITY = \"Apple Distribution\";\n",
                  )
              else:
                  block = re.sub(r'CODE_SIGN_IDENTITY = "[^"]+";', 'CODE_SIGN_IDENTITY = "Apple Distribution";', block)

              sdk_identity = '"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";'
              if sdk_identity not in block:
                  block = re.sub(
                      r'(CODE_SIGN_IDENTITY = "Apple Distribution";\n)',
                      r'\1\t\t\t\t"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";\n',
                      block,
                      count=1,
                  )
              else:
                  block = re.sub(
                      r'"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "[^"]+";',
                      sdk_identity,
                      block,
                  )

              if "PROVISIONING_PROFILE_SPECIFIER =" in block:
                  block = re.sub(
                      r'PROVISIONING_PROFILE_SPECIFIER = "[^"]*";',
                      f'PROVISIONING_PROFILE_SPECIFIER = "{profile_name}";',
                      block,
                  )
              else:
                  block = block.replace(
                      'PRODUCT_NAME = "$(TARGET_NAME)";\n',
                      f'PRODUCT_NAME = "$(TARGET_NAME)";\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "{profile_name}";\n',
                  )

              sdk_profile = f'"PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]" = "{profile_name}";'
              if '"PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]"' in block:
                  block = re.sub(
                      r'"PROVISIONING_PROFILE_SPECIFIER\[sdk=iphoneos\*\]" = "[^"]*";',
                      sdk_profile,
                      block,
                  )
              else:
                  block = block.replace(
                      f'PROVISIONING_PROFILE_SPECIFIER = "{profile_name}";\n',
                      f'PROVISIONING_PROFILE_SPECIFIER = "{profile_name}";\n\t\t\t\t{sdk_profile}\n',
                      1,
                  )
              return block

          text = re.sub(
              r"\t\t[0-9A-F]+ /\* (?:Debug|Release|Profile) \*/ = \{\n.*?\n\t\t\};",
              patch_block,
              text,
              flags=re.S,
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Create iOS export options plist
        shell: bash
        run: |
          set -euo pipefail
          IOS_EXPORT_OPTIONS="$RUNNER_TEMP/ios-export-options.plist"
          cat > "$IOS_EXPORT_OPTIONS" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${IOS_PROFILE_NAME}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          echo "IOS_EXPORT_OPTIONS=$IOS_EXPORT_OPTIONS" >> "$GITHUB_ENV"

      - name: Archive iOS app
        shell: bash
        run: |
          set -euo pipefail
          IOS_ARCHIVE_PATH="$RUNNER_TEMP/ios/VoiceX.xcarchive"
          mkdir -p "$(dirname "$IOS_ARCHIVE_PATH")"
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$IOS_ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APPSTORE_API_KEY_P8" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID" \
            archive
          echo "IOS_ARCHIVE_PATH=$IOS_ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Export iOS IPA
        shell: bash
        run: |
          set -euo pipefail
          IOS_EXPORT_DIR="$RUNNER_TEMP/ios-export"
          rm -rf "$IOS_EXPORT_DIR"
          xcodebuild \
            -exportArchive \
            -archivePath "$IOS_ARCHIVE_PATH" \
            -exportPath "$IOS_EXPORT_DIR" \
            -exportOptionsPlist "$IOS_EXPORT_OPTIONS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APPSTORE_API_KEY_P8" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID"
          IOS_IPA_PATH="$(find "$IOS_EXPORT_DIR" -maxdepth 2 -name '*.ipa' -print -quit)"
          if [ -z "$IOS_IPA_PATH" ]; then
            echo "iOS IPA not found under $IOS_EXPORT_DIR"
            exit 1
          fi
          echo "IOS_IPA_PATH=$IOS_IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: ios-ipa
          path: ${{ env.IOS_IPA_PATH }}

      - name: Upload iOS build to TestFlight
        shell: bash
        run: |
          set -euo pipefail
          args=(
            pilot upload
            --api_key_path "$APPSTORE_API_KEY_JSON"
            --app_identifier "$IOS_BUNDLE_ID"
            --ipa "$IOS_IPA_PATH"
            --changelog "$APPLE_RELEASE_NOTES"
            --skip_submission true
          )
          if [ "$APPLE_RELEASE_TRACK" != "app-store" ]; then
            args+=(--skip_waiting_for_build_processing true)
          fi
          fastlane "${args[@]}"

      - name: Prepare macOS Flutter config
        shell: bash
        run: |
          set -euo pipefail
          flutter build macos \
            --release \
            --config-only \
            --build-name "$APP_VERSION_NAME" \
            --build-number "$APP_VERSION_CODE" \
            --dart-define-from-file="$APPLE_DART_DEFINES_FILE"
          pushd macos >/dev/null
          pod install
          popd >/dev/null

      - name: Configure macOS Runner signing for CI
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("macos/Runner.xcodeproj/project.pbxproj")
          text = path.read_text(encoding="utf-8")
          profile_name = os.environ["MACOS_PROFILE_NAME"]

          def patch_block(match: re.Match[str]) -> str:
              block = match.group(0)
              if "PRODUCT_BUNDLE_IDENTIFIER = com.kingdomm.voicex;" not in block:
                  return block
              if "name = Release;" not in block and "name = Profile;" not in block:
                  return block

              block = re.sub(r"CODE_SIGN_STYLE = [^;]+;", "CODE_SIGN_STYLE = Manual;", block)
              if 'CODE_SIGN_IDENTITY = "Apple Distribution";' not in block:
                  block = re.sub(
                      r'("CODE_SIGN_IDENTITY\[sdk=macosx\*\]" = "Apple Development";\n)',
                      r'CODE_SIGN_IDENTITY = "Apple Distribution";\n\1',
                      block,
                      count=1,
                  )
              else:
                  block = re.sub(r'CODE_SIGN_IDENTITY = "[^"]+";', 'CODE_SIGN_IDENTITY = "Apple Distribution";', block)

              block = re.sub(
                  r'"CODE_SIGN_IDENTITY\[sdk=macosx\*\]" = "[^"]+";',
                  '"CODE_SIGN_IDENTITY[sdk=macosx*]" = "Apple Distribution";',
                  block,
              )

              block = re.sub(
                  r'PROVISIONING_PROFILE_SPECIFIER = "[^"]*";',
                  f'PROVISIONING_PROFILE_SPECIFIER = "{profile_name}";',
                  block,
              )
              return block

          text = re.sub(
              r"\t\t[0-9A-F]+ /\* (?:Debug|Release|Profile) \*/ = \{\n.*?\n\t\t\};",
              patch_block,
              text,
              flags=re.S,
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Create macOS export options plist
        shell: bash
        run: |
          set -euo pipefail
          MACOS_EXPORT_OPTIONS="$RUNNER_TEMP/macos-export-options.plist"
          cat > "$MACOS_EXPORT_OPTIONS" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${MACOS_BUNDLE_ID}</key>
              <string>${MACOS_PROFILE_NAME}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>installerSigningCertificate</key>
            <string>3rd Party Mac Developer Installer</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          echo "MACOS_EXPORT_OPTIONS=$MACOS_EXPORT_OPTIONS" >> "$GITHUB_ENV"

      - name: Archive macOS app
        shell: bash
        run: |
          set -euo pipefail
          MACOS_ARCHIVE_PATH="$RUNNER_TEMP/macos/VoiceX.xcarchive"
          mkdir -p "$(dirname "$MACOS_ARCHIVE_PATH")"
          xcodebuild \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$MACOS_ARCHIVE_PATH" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APPSTORE_API_KEY_P8" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID" \
            archive
          echo "MACOS_ARCHIVE_PATH=$MACOS_ARCHIVE_PATH" >> "$GITHUB_ENV"

      - name: Export macOS package
        shell: bash
        run: |
          set -euo pipefail
          MACOS_EXPORT_DIR="$RUNNER_TEMP/macos-export"
          rm -rf "$MACOS_EXPORT_DIR"
          xcodebuild \
            -exportArchive \
            -archivePath "$MACOS_ARCHIVE_PATH" \
            -exportPath "$MACOS_EXPORT_DIR" \
            -exportOptionsPlist "$MACOS_EXPORT_OPTIONS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APPSTORE_API_KEY_P8" \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_ISSUER_ID"
          MACOS_PKG_PATH="$(find "$MACOS_EXPORT_DIR" -maxdepth 3 -name '*.pkg' -print -quit)"
          if [ -z "$MACOS_PKG_PATH" ]; then
            echo "macOS package not found under $MACOS_EXPORT_DIR"
            exit 1
          fi
          echo "MACOS_PKG_PATH=$MACOS_PKG_PATH" >> "$GITHUB_ENV"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-pkg
          path: ${{ env.MACOS_PKG_PATH }}

      - name: Upload macOS build to TestFlight
        shell: bash
        run: |
          set -euo pipefail
          args=(
            pilot upload
            --api_key_path "$APPSTORE_API_KEY_JSON"
            --app_identifier "$MACOS_BUNDLE_ID"
            --pkg "$MACOS_PKG_PATH"
            --changelog "$APPLE_RELEASE_NOTES"
            --skip_submission true
          )
          if [ "$APPLE_RELEASE_TRACK" != "app-store" ]; then
            args+=(--skip_waiting_for_build_processing true)
          fi
          fastlane "${args[@]}"

      - name: Submit iOS build to App Store review
        if: ${{ steps.apple_version.outputs.release_track == 'app-store' }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            deliver submit_build
            --api_key_path "$APPSTORE_API_KEY_JSON"
            --app_identifier "$IOS_BUNDLE_ID"
            --platform ios
            --app_version "$APP_VERSION_NAME"
            --build_number "$APP_VERSION_CODE"
            --skip_binary_upload true
            --skip_metadata true
            --skip_screenshots true
            --submit_for_review true
            --force
          )
          if [ "${APPLE_AUTOMATIC_RELEASE,,}" = "true" ]; then
            args+=(--automatic_release true)
          else
            args+=(--automatic_release false)
          fi
          if [ -n "$APPLE_SUBMISSION_INFORMATION_JSON" ]; then
            args+=(--submission_information "$APPLE_SUBMISSION_INFORMATION_JSON")
          fi
          fastlane "${args[@]}"

      - name: Submit macOS build to App Store review
        if: ${{ steps.apple_version.outputs.release_track == 'app-store' }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            deliver submit_build
            --api_key_path "$APPSTORE_API_KEY_JSON"
            --app_identifier "$MACOS_BUNDLE_ID"
            --platform osx
            --app_version "$APP_VERSION_NAME"
            --build_number "$APP_VERSION_CODE"
            --skip_binary_upload true
            --skip_metadata true
            --skip_screenshots true
            --submit_for_review true
            --force
          )
          if [ "${APPLE_AUTOMATIC_RELEASE,,}" = "true" ]; then
            args+=(--automatic_release true)
          else
            args+=(--automatic_release false)
          fi
          if [ -n "$APPLE_SUBMISSION_INFORMATION_JSON" ]; then
            args+=(--submission_information "$APPLE_SUBMISSION_INFORMATION_JSON")
          fi
          fastlane "${args[@]}"
